<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Lernfragen Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d;
    --accent: #6c63ff; --accent2: #ff6584; --green: #00e5a0; --red: #ff4d6d;
    --text: #e8e8f0; --muted: #7070a0; --glow: rgba(108,99,255,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 0 16px 60px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: 0.2; pointer-events: none; z-index: 0;
  }
  .wrapper { width: 100%; max-width: 720px; position: relative; z-index: 1; }
  header { text-align: center; padding: 48px 0 32px; }
  header .badge {
    display: inline-block; background: var(--glow); border: 1px solid var(--accent);
    color: var(--accent); font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(2rem,5vw,3.2rem); font-weight: 800;
    line-height: 1.1; background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 0.85rem; }
  .progress-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 8px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .progress-info { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.72rem; margin-bottom: 24px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px; margin-bottom: 20px; animation: fadeUp 0.35s ease both;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 16px 16px 0 0;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  .q-number { font-size: 0.7rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .q-text { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 600; line-height: 1.55; color: var(--text); margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.88rem;
    padding: 14px 18px; text-align: left; transition: border-color .2s, background .2s, transform .1s;
    display: flex; align-items: flex-start; gap: 12px; line-height: 1.5;
  }
  .option-btn .opt-letter {
    min-width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 0.72rem;
    font-weight: 500; color: var(--muted); transition: background .2s, color .2s, border-color .2s;
    flex-shrink: 0; margin-top: 1px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,0.08); transform: translateX(3px); }
  .option-btn:hover:not(:disabled) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
  .option-btn:disabled { cursor: not-allowed; }
  .option-btn.correct { border-color: var(--green); background: rgba(0,229,160,0.08); }
  .option-btn.correct .opt-letter { background: var(--green); border-color: var(--green); color: #000; }
  .option-btn.wrong { border-color: var(--red); background: rgba(255,77,109,0.08); }
  .option-btn.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
  .note-box { margin-top: 16px; padding: 12px 16px; background: rgba(108,99,255,0.07); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
  .note-box strong { color: var(--text); }
  .answered-correct { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--green); margin-top: 16px; }
  .answered-wrong { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--red); margin-top: 16px; }
  .btn-next {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none; border-radius: 10px; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer;
    transition: opacity .2s, transform .15s; margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.92; transform: translateY(-1px); }
  #result-screen { display: none; text-align: center; padding-top: 20px; }
  .score-ring { width: 160px; height: 160px; margin: 0 auto 24px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }
  .score-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-pct { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .score-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .result-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px; }
  .stat-box .val { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
  .stat-box .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .stat-box.cs .val { color: var(--green); } .stat-box.ws .val { color: var(--red); }
  .btn-restart { width: 100%; padding: 15px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; color: var(--accent); font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background .2s; margin-bottom: 12px; }
  .btn-restart:hover { background: var(--glow); }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="badge">IT Grundlagen</div>
    <h1>Lernfragen Quiz</h1>
    <p>Netzwerke · Datensicherung · RAID · USV · IP-Adressen</p>
  </header>
  <div id="quiz-screen">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-info"><span id="q-counter">Frage 1 von 80</span><span id="score-counter">✓ 0 &nbsp; ✗ 0</span></div>
    <div class="card" id="question-card">
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div id="q-body"></div>
    </div>
    <button class="btn-next" id="btn-next" style="display:none" onclick="nextQ()">Weiter →</button>
  </div>
  <div id="result-screen">
    <div class="score-ring">
      <svg viewBox="0 0 100 100" width="160" height="160">
        <circle class="ring-bg" cx="50" cy="50" r="42"/>
        <circle class="ring-fill" id="ring-fill" cx="50" cy="50" r="42"/>
      </svg>
      <div class="score-inner"><div class="score-pct" id="score-pct"></div><div class="score-label">Ergebnis</div></div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="stats-grid">
      <div class="stat-box cs"><div class="val" id="res-correct"></div><div class="lbl">Richtig</div></div>
      <div class="stat-box ws"><div class="val" id="res-wrong"></div><div class="lbl">Falsch</div></div>
      <div class="stat-box"><div class="val" style="color:var(--accent)" id="res-total"></div><div class="lbl">Gesamt</div></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">⟳ Nochmal spielen</button>
    <button class="btn-restart" onclick="restartShuffle()" style="border-color:var(--accent2);color:var(--accent2)">⟳ Zufällige Reihenfolge</button>
  </div>
</div>
<script>
const LETTERS = ['A','B','C','D'];
const QUESTIONS = [
  // 1
  { q:"Wie erfolgt der Datenverkehr im Internet?", opts:["Leitungsvermittlung","Paketvermittlung","Drahtlose Übertragung","Modemvermittlung"], c:1 },
  // 2
  { q:"Was ist Colocation?", opts:["Ein eigenes Netz außerhalb des Internets","Die Spiegelung von Daten zwischen Rechenzentren","Das Vermieten von Stellplätzen oder Einschubplätzen in Racks in gut vernetzten Rechenzentren","Die Übernahme der Stromversorgung durch externe Dienstleister"], c:2 },
  // 3
  { q:"Welcher Dienst ermöglicht die Dateiübertragung zwischen Computern in einem Netzwerk?", opts:["HTTP","FTP","DNS","DHCP"], c:1 },
  // 4
  { q:"Welcher Netzwerkdienst wird für die Überwachung und Verwaltung von Netzwerkgeräten verwendet?", opts:["DNS","FTP","SNMP","HTTP"], c:2 },
  // 5
  { q:"Welche Lichtwellenleiterart wird dargestellt, wenn Lichtstrahlen im Zickzack verlaufen?", opts:["Monomode","Stufenindex-Multimode","Gradientenindex"], c:1 },
  // 6
  { q:"Welche Lichtwellenleiterart wird dargestellt, wenn ein gerader Lichtstrahl zu sehen ist?", opts:["Monomode","Stufenindex-Multimode","Gradientenindex"], c:0 },
  // 7
  { q:"Was repräsentiert das CRC in einem Ethernet-Frame?", opts:["Eine Fehlerprüfsumme","Eine Adressierungsinformation","Eine Längenangabe","Eine Typinformation"], c:0 },
  // 8
  { q:"Wie lange dauert die Übertragung von 500 MB bei einer Bandbreite von 100 MB/s?", opts:["5 s","10 s","50 s","1 s"], c:0 },
  // 9
  { q:"Welche Topologie ist am einfachsten zu installieren?", opts:["Ringtopologie","Maschentopologie","Sterntopologie","Baumtopologie"], c:2 },
  // 10
  { q:"Welche Topologie verwendet eine zentrale Leitung, an die alle Knoten angeschlossen sind?", opts:["Ringtopologie","Maschentopologie","Bus-Topologie","Baumtopologie"], c:2 },
  // 11 – Bringen Sie die Beschriftung des TA in die richtige Reihenfolge
  { q:"Bringen Sie die Beschriftung des TA in die richtige Reihenfolge. Was steht an Position 3?", opts:["Gebäudebezeichnung","Etage","Nummer des Stockwerkverteilers","Patchfeldbezeichnung"], c:2, note:"Korrekte Reihenfolge: 1 Gebäudebezeichnung · 2 Etage · 3 Nummer des Stockwerkverteilers · 4 Patchfeldbezeichnung · 5 Steckplatz/Port" },
  // 12
  { q:"Welche Schicht des OSI-Modells ist für die Segmentierung von Daten verantwortlich?", opts:["Präsentationsschicht","Transportschicht","Vermittlungsschicht","Sitzungsschicht"], c:1 },
  // 13
  { q:"Warum ist die Datensicherung laut Datenrettungsunternehmen für Unternehmen überlebenswichtig?", opts:["Weil sie Kosten reduziert","Weil sie den Umsatz steigert","Weil Unternehmen nach Datenverlust oft in Konkurs gehen","Weil sie die Produktivität fördert"], c:2 },
  // 14
  { q:"Welche Methode eignet sich besonders für Unternehmen mit mehreren Niederlassungen und mehreren Rechenzentren?", opts:["Bandsicherung","Cloud-Backup","Off-Premises-Backup","Inkrementelles Backup"], c:2 },
  // 15
  { q:"Was wird durch ein Speicherabbild-Backup gesichert?", opts:["Nur gelöschte Dateien","Das gesamte Dateisystem inklusive gelöschter Dateien","Nur aktuelle Dateien","Dateien in der Cloud"], c:1 },
  // 16
  { q:"Welche Bedeutung hat die Entfernung von mindestens 3 km zwischen zwei Rechenzentren beim Off-Premises-Backup?", opts:["Es erleichtert die Wartung der Server","Es verhindert, dass eine Katastrophe an einem Standort auch den anderen betrifft","Es ermöglicht schnelle Datenübertragung","Es reduziert die Kosten der Datensicherung"], c:1 },
  // 17
  { q:"Wofür eignet sich das Voll-Backup besonders?", opts:["Für große Datenmengen","Zur Sicherung aller Dateien einer Platte","Für Unternehmen mit nur einer Niederlassung","Zur Sicherung von geänderten Dateien"], c:1 },
  // 18
  { q:"Warum ist die Aufbewahrung von Bändern außerhalb des Serverraums wichtig?", opts:["Um die Bänder vor Diebstahl zu schützen","Um sicherzustellen, dass ein Feuer im Rechenzentrum die Bänder nicht zerstört","Um den Zugriff auf die Bänder zu erleichtern","Um Platz im Serverraum zu sparen"], c:1 },
  // 19
  { q:"Was übernimmt der Cloud-Anbieter beim Cloud-Backup?", opts:["Die Datensicherung","Die Wartung der Bänder","Die Wartung der Server, Klimaanlage und Stromversorgung","Die Auswahl der zu sichernden Dateien"], c:2 },
  // 20

  { q:"Warum ist das Testen der Datensicherung und Wiederherstellung von großer Bedeutung?", opts:["Um die Backup-Zeit zu reduzieren","Um sicherzustellen, dass genau die gesicherten Daten auch wiederhergestellt werden können","Um die Kosten der Datensicherung zu überprüfen","Um die Wartung der Server zu erleichtern"], c:1 },
  // 22

  // 23
  { q:"Welche Methode empfiehlt sich besonders für Unternehmen mit nur einer Niederlassung?", opts:["Off-Premises-Backup","Cloud-Backup","Bandsicherung","Inkrementelles Backup"], c:0 },
  // 24
  { q:"Was übernimmt der Bandroboter bei der Bandsicherung?", opts:["Die Auswahl der zu sichernden Dateien","Die Wartung der Bänder","Das automatische Sichern und Wechseln von Bandkassetten","Die Sicherung in der Cloud"], c:2 },
  // 25
  { q:"Welche Methode eignet sich für Unternehmen jeder Größe und wird immer beliebter?", opts:["Bandsicherung","Off-Premises-Backup","Cloud-Backup","Speicherabbild-Backup"], c:2 },
  // 26
  { q:"Was ist der Zweck eines inkrementellen Backups?", opts:["Alle Dateien einer Platte sichern","Nur geänderte Dateien seit der letzten Vollsicherung oder inkrementellen Sicherung sichern","Das gesamte Dateisystem mit gelöschten Dateien sichern","Nur Dateien in der Cloud sichern"], c:1 },
  // 27
  { q:"Welches RAID-Level zeichnet sich durch Striping aus, bei dem Daten gleichmäßig über mehrere Festplatten verteilt werden?", opts:["RAID 1","RAID 5","RAID 0","RAID 6"], c:2 },
  // 28
  { q:"Was ist das Hauptmerkmal von RAID 1?", opts:["Striping","Datensicherheit durch Spiegelung","Block-Level Striping mit Paritätsinformationen","Doppelte Parität"], c:1 },
  // 29

  // 30

  // 33

  // 35
  { q:"Was ist RAID und wofür wird es in den meisten Fällen verwendet?", opts:["Ein kabelloses Netzwerkprotokoll","Ein Dateisystem für SSDs","Ein Verbund aus Festplatten oder SSDs zur Datenredundanz und erhöhten Zugriffsgeschwindigkeit","Ein Videokompressionsalgorithmus"], c:2 },
  // 36
  { q:"Was ist der Hauptzweck von RAID 0?", opts:["Datenredundanz","Erhöhung der Zugriffsgeschwindigkeit","Hohe Sicherheit gegen Laufwerksausfall","Spiegelung der Daten auf mehreren Laufwerken"], c:1 },
  // 37
  { q:"Welches RAID-Level bietet eine hohe Sicherheit gegen Laufwerksausfall, geht jedoch mit hohen Kosten einher?", opts:["RAID 0","RAID 1","RAID 5","RAID 6"], c:1 },
  // 38
  { q:"Welche Aussage trifft am ehesten auf RAID 5 zu?", opts:["Daten werden auf mehreren Laufwerken verteilt, um die Transferrate zu steigern.","Die Daten werden gleichzeitig auf mehreren Laufwerken gespiegelt.","Verteilung der Daten auf mindestens drei Platten, wobei Redundanzinformationen verteilt gespeichert werden.","Ein Verbund aus mehreren Einzellaufwerken ohne Redundanz."], c:2 },
  // 39

  // 40

  // 42
  { q:"Was ist die Nettokapazität eines RAID-5-Verbunds aus drei Laufwerken in Bezug auf die Gesamtkapazität?", opts:["33 %","50 %","66 %","80 %"], c:2 },

  // 47
  { q:"Was übernimmt im Normalbetrieb bei aktuellen USV-Geräten die Kontrolle der Netzspannung?", opts:["Schütz","Mikrocontroller","Relais","Spannungsüberwachung"], c:1 },
  // 48
  { q:"Wie lange dauert der Umschaltvorgang einer USV im Stützbetrieb in der Regel?", opts:["1 bis 5 Sekunden","10 bis 20 Millisekunden","4 bis 10 Millisekunden","30 bis 60 Sekunden"], c:2 },
  // 49
  { q:"Welches Bauteil erzeugt aus der Gleichspannung des Akkus 230 Volt Wechselspannung in einer USV?", opts:["Transformator","Thyristor","Wechselrichter","Schaltnetzteil"], c:2 },
  // 50
  { q:"Welcher USV-Typ kann kleinere Schwankungen der Netzspannung ausgleichen, ohne in den Stützbetrieb zu wechseln?", opts:["Standby- oder VFD-Modell","Voltage Independent (VI) / Line Interactive","Online-Double-Conversion (VFI)","Offline-USV"], c:1 },
  // 51
  { q:"Welche USV-Klasse schützt nur gegen Netzausfälle und kurzzeitige Spannungsschwankungen, gleicht jedoch keine Unter- und Überspannungen aus?", opts:["Voltage Independent (VI)","Online-Double-Conversion (VFI)","Voltage and Frequency Dependent (VFD) / Standby-Modell","Line Interactive"], c:2 },
  // 52
  { q:"Welche USV-Technik gilt als echter Stromgenerator und versorgt angeschlossene Verbraucher ständig ohne Einschränkungen mit Netzspannung?", opts:["Standby- oder Offline-USV","Voltage Independent (VI) / Line Interactive","Voltage and Frequency Independent (VFI) / Online-Double-Conversion","Trapez-Wechselrichter"], c:2 },
  // 53

let questions = [...QUESTIONS];
let current = 0, score = 0, wrong = 0, answered = false;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function renderQ(){
  answered = false;
  const q = questions[current];
  const total = questions.length;
  document.getElementById('progress-bar').style.width=`${(current/total)*100}%`;
  document.getElementById('q-counter').textContent=`Frage ${current+1} von ${total}`;
  document.getElementById('score-counter').innerHTML=`✓ ${score} &nbsp; ✗ ${wrong}`;
  document.getElementById('q-number').textContent=`#${current+1}`;
  document.getElementById('q-text').textContent=q.q;
  const body=document.getElementById('q-body');
  body.innerHTML='';
  const optsDiv=document.createElement('div');
  optsDiv.className='options';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>selectOption(i,btn,optsDiv,q);
    optsDiv.appendChild(btn);
  });
  body.appendChild(optsDiv);
  if(q.note){const n=document.createElement('div');n.className='note-box';n.innerHTML=`<strong>💡 Hinweis:</strong> ${q.note}`;body.appendChild(n);}
  document.getElementById('btn-next').style.display='none';
  const card=document.getElementById('question-card');
  card.style.animation='none';void card.offsetWidth;card.style.animation='fadeUp 0.35s ease both';
}

function selectOption(idx,btn,optsDiv,q){
  if(answered)return;
  answered=true;
  optsDiv.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=idx===q.c;
  if(ok){btn.classList.add('correct');score++;}
  else{btn.classList.add('wrong');optsDiv.querySelectorAll('.option-btn')[q.c].classList.add('correct');wrong++;}
  const fb=document.createElement('div');
  fb.className=ok?'answered-correct':'answered-wrong';
  fb.textContent=ok?'✓ Richtig!':`✗ Falsch — Richtig wäre: ${LETTERS[q.c]}`;
  optsDiv.parentNode.appendChild(fb);
  document.getElementById('score-counter').innerHTML=`✓ ${score} &nbsp; ✗ ${wrong}`;
  const btn_next=document.getElementById('btn-next');
  btn_next.style.display='block';
  if(current===questions.length-1)btn_next.textContent='Ergebnis anzeigen →';
}

function nextQ(){current++;if(current>=questions.length)showResult();else renderQ();}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const pct=Math.round((score/questions.length)*100);
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('res-correct').textContent=score;
  document.getElementById('res-wrong').textContent=wrong;
  document.getElementById('res-total').textContent=questions.length;
  let t,s;
  if(pct>=90){t='🏆 Ausgezeichnet!';s='Du hast die IT-Grundlagen voll drauf.';}
  else if(pct>=75){t='🎉 Gut gemacht!';s='Nur noch ein paar Lücken zu schließen.';}
  else if(pct>=50){t='📚 Weiter so!';s='Wiederhole die schwierigeren Themen nochmal.';}
  else{t='💪 Nicht aufgeben!';s='Mehr Übung wird den Unterschied machen.';}
  document.getElementById('result-title').textContent=t;
  document.getElementById('result-sub').textContent=s;
  const c=2*Math.PI*42;
  const ring=document.getElementById('ring-fill');
  ring.style.strokeDasharray=c;ring.style.strokeDashoffset=c;
  const col=pct>=75?'var(--green)':pct>=50?'var(--accent)':'var(--red)';
  ring.style.stroke=col;document.getElementById('score-pct').style.color=col;
  setTimeout(()=>{ring.style.strokeDashoffset=c*(1-pct/100);},100);
}

function restartQuiz(){questions=[...QUESTIONS];current=0;score=0;wrong=0;document.getElementById('result-screen').style.display='none';document.getElementById('quiz-screen').style.display='block';document.getElementById('btn-next').textContent='Weiter →';renderQ();}
function restartShuffle(){questions=shuffle([...QUESTIONS]);current=0;score=0;wrong=0;document.getElementById('result-screen').style.display='none';document.getElementById('quiz-screen').style.display='block';document.getElementById('btn-next').textContent='Weiter →';renderQ();}

renderQ();
</script>
