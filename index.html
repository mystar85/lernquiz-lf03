<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Lernfragen Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d;
    --accent: #6c63ff; --accent2: #ff6584; --green: #00e5a0; --red: #ff4d6d;
    --text: #e8e8f0; --muted: #7070a0; --glow: rgba(108,99,255,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 0 16px 60px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: 0.2; pointer-events: none; z-index: 0;
  }
  .wrapper { width: 100%; max-width: 720px; position: relative; z-index: 1; }
  header { text-align: center; padding: 48px 0 32px; }
  header .badge {
    display: inline-block; background: var(--glow); border: 1px solid var(--accent);
    color: var(--accent); font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(2rem,5vw,3.2rem); font-weight: 800;
    line-height: 1.1; background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 0.85rem; }
  .progress-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 8px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .progress-info { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.72rem; margin-bottom: 24px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px; margin-bottom: 20px; animation: fadeUp 0.35s ease both;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 16px 16px 0 0;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  .q-number { font-size: 0.7rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .q-text { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 600; line-height: 1.55; color: var(--text); margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .control-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .btn-nav { flex: 1 1 120px; min-width: 120px; padding: 12px 16px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); border-radius: 12px; cursor: pointer; transition: border-color .2s, background .2s; }
  .btn-nav:hover { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  #quiz-screen, #result-screen, .menu-screen { display: none; }
  .screen-card { max-width: 760px; margin: 0 auto 20px; }
  .favorite-button { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-width: 130px; }
  .favorite-button.active { background: rgba(255,208,0,0.12); border-color: #ffcf40; color: #ffe57f; }
  .quiz-actions { margin-top: 18px; }
  .scrollable { overflow:auto; }
  .menu-screen .card { padding: 28px 24px; }
  .option-btn { justify-content: flex-start; }
  .option-btn .opt-letter { width: 26px; height: 26px; }
  .btn-next { min-width: 140px; }
  .btn-next.small { padding: 10px 14px; font-size: 0.85rem; }
  .btn-next.ghost { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
  .btn-next.ghost:hover { background: rgba(108,99,255,0.08); }
  .note-box { margin-top: 16px; padding: 12px 16px; background: rgba(108,99,255,0.07); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
  .note-box strong { color: var(--text); }
  .answered-correct { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--green); margin-top: 16px; }
  .answered-wrong { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--red); margin-top: 16px; }
  .btn-next {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none; border-radius: 10px; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer;
    transition: opacity .2s, transform .15s; margin-top: 8px;
  }
  .match-column-title { color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.72rem; }
  .match-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: border-color .2s, background .2s, transform .1s; text-align: left;
  }
  .match-item:hover:not(.locked) { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .match-item .match-index {
    min-width: 26px; height: 26px; border-radius: 8px; border: 1px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem;
    color: var(--muted); flex-shrink: 0;
  }
  .match-item.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); }
  .match-item.correct { border-color: var(--green); background: rgba(0,229,160,0.08); }
  .match-item.wrong { border-color: var(--red); background: rgba(255,77,109,0.08); }
  .match-item.locked { cursor: default; }
  .order-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
  .order-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .order-item.correct { border-color: var(--green); background: rgba(0,229,160,0.08); }
  .order-item.wrong { border-color: var(--red); background: rgba(255,77,109,0.08); }
  .order-label { display: flex; align-items: center; gap: 12px; }
  .order-controls { display: flex; gap: 8px; }
  .order-controls button {
    width: 34px; height: 34px; border: none; border-radius: 8px; background: rgba(255,255,255,0.05);
    color: var(--text); font-size: 1rem; cursor: pointer; transition: background .2s;
  }
  .order-controls button:hover:not(:disabled) { background: rgba(108,99,255,0.14); }
  .order-controls button:disabled { opacity: 0.35; cursor: not-allowed; }
  .option-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.88rem;
    padding: 14px 18px; text-align: left; transition: border-color .2s, background .2s, transform .1s;
    display: flex; align-items: flex-start; gap: 12px; line-height: 1.5; flex-wrap: wrap;
  }
  .option-btn > span:last-child {
    min-width: 0; white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  }
  .option-btn .opt-letter {
    min-width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 0.72rem;
    font-weight: 500; color: var(--muted); transition: background .2s, color .2s, border-color .2s;
    flex-shrink: 0; margin-top: 1px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,0.08); transform: translateX(3px); }
  .option-btn:hover:not(:disabled) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
  .option-btn:disabled { cursor: not-allowed; }
  .option-btn.correct { border-color: var(--green); background: rgba(0,229,160,0.08); }
  .option-btn.correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .option-btn.wrong { border-color: var(--red); background: rgba(255,77,109,0.08); }
  .question-jump { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 18px; }
  .question-jump label { color: var(--muted); font-size: 0.82rem; }
  .question-jump select { min-width: 180px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 14px; }
  .question-jump select:focus { outline: none; border-color: var(--accent); }
  .option-btn.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
  .note-box { margin-top: 16px; padding: 12px 16px; background: rgba(108,99,255,0.07); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
  .note-box strong { color: var(--text); }
  .answered-correct { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--green); margin-top: 16px; }
  .answered-wrong { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--red); margin-top: 16px; }
  .btn-next {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none; border-radius: 10px; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer;
    transition: opacity .2s, transform .15s; margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.92; transform: translateY(-1px); }
  #result-screen { display: none; text-align: center; padding-top: 20px; }
  .score-ring { width: 160px; height: 160px; margin: 0 auto 24px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }
  .score-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-pct { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .score-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .result-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px; }
  .stat-box .val { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
  .stat-box .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .stat-box.cs .val { color: var(--green); } .stat-box.ws .val { color: var(--red); }
  .btn-restart { width: 100%; padding: 15px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; color: var(--accent); font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background .2s; margin-bottom: 12px; }
  .btn-restart:hover { background: var(--glow); }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="badge">IT Grundlagen</div>
    <h1>Lernfragen Quiz</h1>
    <p>Lernfeld 03</p>
  </header>
  <div id="menu-screen" class="menu-screen">
    <div class="card screen-card">
      <div class="q-number">Hauptmenü</div>
      <div class="q-text">Wähle, wie du starten möchtest.</div>
      <div class="options">
        <button class="option-btn" type="button" onclick="startQuiz()">Quiz starten</button>
        <button class="option-btn" type="button" onclick="startFavorites()">Favoriten üben</button>
      </div>
    </div>
  </div>
  <div id="quiz-screen">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-info"><span id="q-counter">Frage 1 von 80</span><span id="score-counter">✓ 0 &nbsp; ✗ 0</span></div>
    <div class="card" id="question-card">
      <div class="question-jump">
        <label for="question-jump-select">Schnell zu:</label>
        <select id="question-jump-select" onchange="jumpToQuestion(this.value)"></select>
      </div>
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div id="q-body"></div>
      <div class="quiz-actions control-row">
        <button class="btn-nav" type="button" onclick="prevQ()" id="btn-prev">← Zurück</button>
        <button class="btn-nav" type="button" onclick="handleNext()" id="btn-next-nav">Weiter →</button>
        <button class="btn-nav favorite-button" type="button" onclick="toggleFavorite()" id="btn-fav">☆ Favorit</button>
        <button class="btn-nav" type="button" onclick="showMenu()">☰ Menü</button>
      </div>
    </div>
  </div>
  <div id="result-screen">
    <div class="score-ring">
      <svg viewBox="0 0 100 100" width="160" height="160">
        <circle class="ring-bg" cx="50" cy="50" r="42"/>
        <circle class="ring-fill" id="ring-fill" cx="50" cy="50" r="42"/>
      </svg>
      <div class="score-inner"><div class="score-pct" id="score-pct"></div><div class="score-label">Ergebnis</div></div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="stats-grid">
      <div class="stat-box cs"><div class="val" id="res-correct"></div><div class="lbl">Richtig</div></div>
      <div class="stat-box ws"><div class="val" id="res-wrong"></div><div class="lbl">Falsch</div></div>
      <div class="stat-box"><div class="val" style="color:var(--accent)" id="res-total"></div><div class="lbl">Gesamt</div></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">⟳ Nochmal spielen</button>
    <button class="btn-restart" onclick="restartShuffle()" style="border-color:var(--accent2);color:var(--accent2)">⟳ Zufällige Reihenfolge</button>
  </div>
</div>
<script>
const LETTERS = ['A','B','C','D','E','F','G'];
const QUESTIONS = [
// Q1
{
  q: "Was beschreibt ein WAN?",
  opts: ["Ein drahtloses Netzwerk", "Ein auf ein Firmengelände beschränktes Netzwerk", "Ein Netzwerk für batteriebetriebene Endgeräte", "Ein Netzwerk, das sich über große Distanzen erstreckt"],
  c: 3,
},
// Q2
{
  q: "Welche IPv6-Multicast-Adresse spricht alle Geräte im lokalen Netz an?",
  opts: ["ff02::2", "ff02::1", "ff00::1", "fe80::1"],
  c: 1,
},
// Q3
{
  q: "Was ist eine empfehlenswerte Alternative zu angemieteten Leitungen aus Sicherheits- und Performancegründen?",
  opts: ["VPN-Verbindungen", "Externe Cloud-Services", "Spiegelung der Daten zwischen den Rechenzentren", "Eigene Rechenzentren für jede Niederlassung"],
  c: 0,
},
// Q4
{
  q: "Welcher Dienst ermöglicht die Synchronisation von Uhrzeiten zwischen Computern in einem Netzwerk?",
  opts: ["DNS", "NTP", "DHCP", "FTP"],
  c: 1,
},
// Q5
{
  q: "Wie lange dauert die Übertragung von 720 Tb bei einer Datenübertragungsrate von 8 MB/s?",
  opts: ["2860 h", "3125 h", "4820 h", "1640 h", "25000 h", "3665 h"],
  c: 1,
},
// Q6
{
  q: "Wie nennt man die Dateneinheit auf der Vermittlungsschicht (Layer 3)?",
  opts: ["Frame", "Paket", "Segment", "Bit"],
  c: 1,
},
// Q7
{
  q: "Welcher IPv6-Adresstyp verwendet das Präfix `ff00::/8` und entspricht dem IPv4-Bereich `224.0.0.0/4`?",
  opts: ["Multicast", "Anycast", "Global Unicast", "Link-Local"],
  c: 0,
},
// Q8
{
  q: "Subnetzmaske in dezimaler Schreibweise für 192.168.1.20/19?",
  opts: ["255.255.224.0", "255.255.255.0", "255.255.192.0", "255.255.240.0"],
  c: 0,
},
// Q9
{
  q: "Was ist ein Patchpanel?",
  opts: ["Ein Werkzeug zum Testen von Kabeln", "Ein Gerät zur Signalverstärkung", "Eine Art von Netzwerk-Switch", "Eine Komponente, die verschiedene Kabelsegmente verbindet"],
  c: 3,
},
// Q10
{
  q: "Was ist der kleinste Subnetz-Präfix für ein Netzwerk mit 500 Hosts?",
  opts: ["/23", "/24", "/25", "/26"],
  c: 0,
},
// Q11
{
  q: "Welche IPv6-Adresse entspricht dem IPv4-Loopback `127.0.0.1`?",
  opts: ["::0", "fe80::1", "::1", "fd00::1"],
  c: 2,
},
// Q12
{
  q: "Welchen Vorteil hat SLAAC gegenüber DHCPv6?",
  opts: ["SLAAC ist sicherer als DHCPv6", "SLAAC benötigt keinen zentralen Server, Geräte konfigurieren sich selbst", "SLAAC vergibt immer dieselbe Adresse an ein Gerät", "SLAAC funktioniert nur in IPv4-Netzwerken"],
  c: 1,
},
// Q13
{
  q: "Ein Client soll auf das Internet zugreifen. Welche der folgenden Konfigurationen ist für die Standart-Gateway-Adresse korrekt, wenn die Subnetzmaske 255.255.255.0 ist ?",
  opts: ["192.168.1.256", "192.168.1.1", "192.168.1.0", "192.168.255.255"],
  c: 1,
},
// Q14
{
  q: "Ein Client wird in ein Netzwerk integriert, das IPv6 verwendet . Welches der folgenden Beispiel e ist keine gültige IPv6-Adresse?",
  opts: ["fe80::2f3a:56ff:fe74:3d2c", "2001:0db8:85a3:0000:0000:8a2e:0370:7334", "2001:0db8:85a3:0000:0000:8a2e:0370:7g34", "fd00::2f3a:56ff:fe74:3d2c"],
  c: 2,
},
// Q15
{
  q: "Was ist der Zweck der WPS-Taste auf einem Router?",
  opts: ["Die Internetgeschwindigkeit erhöhen", "Eine Verbindung ohne Passworteingabe ermöglichen", "Den Router neustarten", "Die Firewall deaktivieren"],
  c: 1,
},
// Q16
{
  q: "Wie nennt man die Dateneinheit auf der Sicherungsschicht (Layer 2)?",
  opts: ["Paket", "Segment", "Frame", "Bit"],
  c: 2,
},
// Q17
{
  q: "Welcher Netzwerkdienst wird verwendet, um E-Mails zu senden und zu empfangen?",
  opts: ["HTTP", "SMTP", "FTP", "SNMP"],
  c: 1,
},
// Q18
{
  q: "Welches Medium hat typischerweise die höchste Übertragungsgeschwindigkeit?",
  opts: ["Kupferkabel", "Koaxialkabel", "Glasfaser", "Funkwellen"],
  c: 2,
},
// Q19
{
  q: "Welche Technik wird für die Übertragung von Daten über das Stromnetz verwendet?",
  opts: ["Powerline", "Glasfaser", "Funkwellen", "Koaxialkabel"],
  c: 0,
},
// Q20
{
  q: "Welches Merkmal beschreibt UDP am besten?",
  opts: ["Zuverlässige Übertragung", "Verbindungsorientiert", "Schnelle Übertragung", "Sequenzkontrolle"],
  c: 2,
},
// Q21
{
  q: "Welche OSI-Schicht stellt Dienste für Dateiübertragungen bereit?",
  opts: ["Anwendungsschicht", "Präsentationsschicht", "Sitzungsschicht", "Transportschicht"],
  c: 0,
},
// Q22
{
  q: "Welches der folgenden Präfixe gehört zu einer Global Unicast Adresse?",
  opts: ["fe80::1", "fd00::1", "ff02::1", "2001:db8::1"],
  c: 3,
},
// Q23
{
  q: "Welche der folgenden Adressen ist eine gültige IPv6-Link-Local-Adresse?",
  opts: ["2001:db8::1", "fe80::abcd:ef01:2345:6789", "ff02::1", "::1"],
  c: 1,
},
// Q24
{
  q: "Welches Protokoll wird typischerweise für die automatische IP-Konfiguration verwendet?",
  opts: ["HTTP", "FTP", "DHCP", "SMTP"],
  c: 2,
},
// Q25
{
  q: "Welche Information ist notwendig, damit ein Client eine Webseite aufrufen kann?",
  opts: ["Die physische Adresse des Web-Servers", "Die URL der Webseite", "Die Betriebssystemversion des Servers", "Die Anzahl der Links auf der Webseite"],
  c: 1,
},
// Q26
{
  q: "Welcher Dienst übersetzt Domain-Namen in IP-Adressen?",
  opts: ["DHCP", "SMTP", "DNS", "FTP"],
  c: 2,
},
// Q27
{
  q: "Was bezeichnet man als Serverraum, wenn es nur um wenige Server in einem Netzwerk geht?",
  opts: ["Cloud-Server", "Colocation", "Rechenzentrum", "Serverplatz"],
  c: 1,
},
// Q28
{
  q: "Wie erfolgt der Datenverkehr im Internet?",
  opts: ["Modemvermittlung", "Paketvermittlung", "Drahtlose Übertragung", "Leitungsvermittlung"],
  c: 1,
},
// Q29
{

const allQuestions = QUESTIONS.map((q, index) => ({ ...q, id: index }));
const MATCH_COLORS = ['#7c3aed', '#0ea5e9', '#22c55e', '#f97316', '#ec4899', '#14b8a6', '#fde047', '#fb7185'];
function hexToRgba(hex, alpha = 0.14) {
  let c = hex.replace('#', '');
  if (c.length === 3) c = c.split('').map(ch => ch + ch).join('');
  const num = parseInt(c, 16);
  const r = (num >> 16) & 255;
  const g = (num >> 8) & 255;
  const b = num & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
let questions = [...allQuestions];
let current = 0;
let score = 0;
let wrong = 0;
let answered = false;
let correctAnswer = false;
let selectedOption = null;
let matchActive = null;
let matchSelections = [];
let orderState = [];
let favorites = new Set(JSON.parse(localStorage.getItem('quizFavorites') || '[]'));
let currentMode = 'menu';

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function saveFavorites(){ localStorage.setItem('quizFavorites', JSON.stringify([...favorites])); }
function resetQuiz(){ current = 0; score = 0; wrong = 0; answered = false; correctAnswer = false; selectedOption = null; matchActive = null; matchSelections = []; orderState = []; }
function showMenu(){ currentMode = 'menu'; document.getElementById('menu-screen').style.display='block'; document.getElementById('quiz-screen').style.display='none'; document.getElementById('result-screen').style.display='none'; }
function startQuiz(){ questions = [...allQuestions]; resetQuiz(); document.getElementById('menu-screen').style.display='none'; document.getElementById('quiz-screen').style.display='block'; renderQ(); }
function startFavorites(){ const favs = allQuestions.filter(q => favorites.has(q.id)); if (!favs.length){ alert('Keine Favoriten gespeichert. Markiere zuerst Fragen als Favorit.'); return; } questions = favs; resetQuiz(); document.getElementById('menu-screen').style.display='none'; document.getElementById('quiz-screen').style.display='block'; renderQ(); }
function toggleFavorite(){ const q = questions[current]; if (favorites.has(q.id)){ favorites.delete(q.id); } else { favorites.add(q.id); } saveFavorites(); renderQ(); }
function prevQ(){ if (current === 0) return; current--; answered = false; correctAnswer = false; selectedOption = null; matchActive = null; matchSelections = []; orderState = []; renderQ(); }

function populateQuestionJump(){ const select = document.getElementById('question-jump-select'); if (!select) return; select.innerHTML = questions.map((_, i)=>`<option value="${i}">Frage ${i+1}</option>`).join(''); select.value = current; }
function jumpToQuestion(index){ const idx = Number(index); if (Number.isNaN(idx) || idx<0 || idx>=questions.length) return; current = idx; answered = false; correctAnswer = false; selectedOption = null; matchActive = null; matchSelections = []; orderState = []; renderQ(); }

function renderQ(){
  const q = questions[current];
  const total = questions.length;
  document.getElementById('progress-bar').style.width = `${(current/total)*100}%`;
  document.getElementById('q-counter').textContent = `Frage ${current+1} von ${total}`;
  document.getElementById('score-counter').innerHTML = `✓ ${score} &nbsp; ✗ ${wrong}`;
  document.getElementById('q-number').textContent = `#${current+1}`;
  document.getElementById('q-text').textContent = q.q;
  populateQuestionJump();

  const body = document.getElementById('q-body');
  body.innerHTML = '';
  const btnNextNav = document.getElementById('btn-next-nav');

  if (q.type === 'match') {
    if (matchSelections.length !== q.left.length) matchSelections = Array(q.left.length).fill(null);
    const leftItems = q.left.map((text, i) => {
      const classes = ['match-item'];
      let style = '';
      const pairedRight = matchSelections[i];
      if (answered) {
        const correctPair = q.ans.find(pair => pair[0] === i);
        const correctRight = correctPair ? correctPair[1] : null;
        if (matchSelections[i] === correctRight) classes.push('correct');
        else classes.push('wrong');
        classes.push('locked');
      } else if (matchActive === i) {
        classes.push('selected');
      }
      if (pairedRight !== null && !answered) {
        const color = MATCH_COLORS[i % MATCH_COLORS.length];
        style = `style="border-color:${color};background:${hexToRgba(color,0.15)}"`;
      }
      return `<button type="button" class="${classes.join(' ')}" ${style} onclick="selectMatch('left', ${i})"><span class="match-index">${i+1}</span><span>${text}</span></button>`;
    }).join('');
    const rightItems = q.right.map((text, j) => {
      const selectedBy = matchSelections.findIndex(v => v === j);
      const classes = ['match-item'];
      let style = '';
      if (answered) {
        if (selectedBy !== -1) {
          const correctPair = q.ans.find(pair => pair[1] === j);
          const correctLeft = correctPair ? correctPair[0] : null;
          if (selectedBy === correctLeft) classes.push('correct');
          else classes.push('wrong');
        }
        classes.push('locked');
      } else if (selectedBy !== -1) {
        classes.push('selected');
        const color = MATCH_COLORS[selectedBy % MATCH_COLORS.length];
        style = `style="border-color:${color};background:${hexToRgba(color,0.15)}"`;
      }
      return `<button type="button" class="${classes.join(' ')}" ${style} onclick="selectMatch('right', ${j})"><span class="match-index">${String.fromCharCode(65+j)}</span><span>${text}</span></button>`;
    }).join('');
    body.innerHTML = `
      <div class="match-grid">
        <div class="match-column">
          <div class="match-column-title">Beschreibung</div>
          ${leftItems}
        </div>
        <div class="match-column">
          <div class="match-column-title">Begriff</div>
          ${rightItems}
        </div>
      </div>
      <div class="note-box">Wähle zuerst ein Element links, dann den passenden Begriff rechts. Zugeordnete Paare haben dieselbe Farbe.</div>
    `;
  } else if (q.type === 'order') {
    if (orderState.length !== q.opts.length) {
      orderState = q.opts.map((_, i) => i);
      if (JSON.stringify(orderState) === JSON.stringify(q.order)) orderState = shuffle(orderState);
    }
    const orderItems = orderState.map((optIndex, pos) => {
      const classes = ['order-item'];
      if (answered) {
        classes.push(q.order[pos] === optIndex ? 'correct' : 'wrong');
      }
      return `
        <div class="${classes.join(' ')}">
          <div class="order-label"><span class="opt-letter">${pos+1}</span><span>${q.opts[optIndex]}</span></div>
          <div class="order-controls">
            <button type="button" onclick="moveOrder(${pos}, -1)" ${pos === 0 || answered ? 'disabled' : ''}>&uarr;</button>
            <button type="button" onclick="moveOrder(${pos}, 1)" ${pos === q.opts.length-1 || answered ? 'disabled' : ''}>&darr;</button>
          </div>
        </div>
      `;
    }).join('');
    body.innerHTML = `<div class="order-list">${orderItems}</div>`;
  } else {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
      btn.disabled = answered;
      if (answered) {
        if (i === q.c) btn.classList.add('correct');
        if (selectedOption === i && selectedOption !== q.c) btn.classList.add('wrong');
      }
      btn.onclick = () => selectOption(i, q);
      optsDiv.appendChild(btn);
    });
    body.appendChild(optsDiv);
  }

  if (q.note) {
    const n = document.createElement('div');
    n.className = 'note-box';
    n.innerHTML = `<strong>💡 Hinweis:</strong> ${q.note}`;
    body.appendChild(n);
  }

  if (answered) {
    const fb = document.createElement('div');
    if (q.type === 'match') {
      if (correctAnswer) {
        fb.className = 'answered-correct';
        fb.textContent = '✓ Richtig! Alle Zuordnungen sind korrekt.';
      } else {
        const lines = q.left.map((text, i) => {
          const chosen = matchSelections[i];
          const correct = q.ans.find(pair => pair[0] === i)[1];
          return `<div style="margin-top:8px;">${text}<br><strong>Gewählt:</strong> ${chosen !== null ? q.right[chosen] : '–'}<br><strong>Richtig:</strong> ${q.right[correct]}</div>`;
        }).join('');
        fb.className = 'answered-wrong';
        fb.innerHTML = `✗ Falsch — richtige Zuordnungen:<br>${lines}`;
      }
    } else if (q.type === 'order') {
      if (correctAnswer) {
        fb.className = 'answered-correct';
        fb.textContent = '✓ Richtig! Die Reihenfolge ist korrekt.';
      } else {
        const correctOrder = q.order.map(i => q.opts[i]).join(' → ');
        fb.className = 'answered-wrong';
        fb.innerHTML = `✗ Falsch — richtige Reihenfolge:<br>${correctOrder}`;
      }
    } else {
      if (correctAnswer) {
        fb.className = 'answered-correct';
        fb.textContent = '✓ Richtig!';
      } else {
        fb.className = 'answered-wrong';
        fb.textContent = `✗ Falsch — Richtig wäre: ${LETTERS[q.c]}`;
      }
    }
    body.appendChild(fb);
  }

  const btnFav = document.getElementById('btn-fav');
  btnFav.textContent = favorites.has(q.id) ? '★ Favorit' : '☆ Favorit';
  btnFav.className = 'btn-nav favorite-button' + (favorites.has(q.id) ? ' active' : '');
  document.getElementById('btn-prev').disabled = current === 0;

  if (q.type === 'match' || q.type === 'order') {
    btnNextNav.disabled = q.type === 'match' && !matchSelections.every(v => v !== null) && !answered;
    btnNextNav.textContent = answered ? (current === questions.length - 1 ? 'Ergebnis anzeigen →' : 'Weiter →') : 'Antwort prüfen';
  } else {
    btnNextNav.disabled = false;
    btnNextNav.textContent = current === questions.length - 1 ? 'Ergebnis anzeigen →' : 'Weiter →';
  }

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.35s ease both';
}

function selectOption(idx, q) {
  if (answered) return;
  selectedOption = idx;
  answered = true;
  correctAnswer = idx === q.c;
  if (correctAnswer) score++;
  else wrong++;
  renderQ();
}

function selectMatch(side, index) {
  if (answered) return;
  if (side === 'left') {
    if (matchActive === index) {
      matchActive = null;
      renderQ();
      return;
    }
    matchActive = index;
  } else if (side === 'right' && matchActive !== null) {
    const existingLeft = matchSelections.findIndex(v => v === index);
    if (existingLeft !== -1) matchSelections[existingLeft] = null;
    matchSelections[matchActive] = index;
    matchActive = null;
  }
  renderQ();
}

function moveOrder(position, direction) {
  const target = position + direction;
  if (target < 0 || target >= orderState.length) return;
  [orderState[position], orderState[target]] = [orderState[target], orderState[position]];
  renderQ();
}

function handleNext() {
  const q = questions[current];
  if (answered) {
    nextQ();
    return;
  }
  if (q.type === 'match') {
    if (!matchSelections.every(v => v !== null)) return;
    const correct = q.ans.every(([l, r]) => matchSelections[l] === r);
    correctAnswer = correct;
    answered = true;
    if (correct) score++;
    else wrong++;
    renderQ();
  } else if (q.type === 'order') {
    const correct = JSON.stringify(orderState) === JSON.stringify(q.order);
    correctAnswer = correct;
    answered = true;
    if (correct) score++;
    else wrong++;
    renderQ();
  } else {
    nextQ();
  }
}

function nextQ() {
  current++;
  if (current >= questions.length) showResult();
  else {
    answered = false;
    correctAnswer = false;
    selectedOption = null;
    matchActive = null;
    matchSelections = [];
    orderState = [];
    renderQ();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-total').textContent = questions.length;
  let t, s;
  if (pct >= 90) { t = '🏆 Ausgezeichnet!'; s = 'Du hast die IT-Grundlagen voll drauf.'; }
  else if (pct >= 75) { t = '🎉 Gut gemacht!'; s = 'Nur noch ein paar Lücken zu schließen.'; }
  else if (pct >= 50) { t = '📚 Weiter so!'; s = 'Wiederhole die schwierigeren Themen nochmal.'; }
  else { t = '💪 Nicht aufgeben!'; s = 'Mehr Übung wird den Unterschied machen.'; }
  document.getElementById('result-title').textContent = t;
  document.getElementById('result-sub').textContent = s;
  const c = 2 * Math.PI * 42;
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDasharray = c; ring.style.strokeDashoffset = c;
  const col = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--red)';
  ring.style.stroke = col; document.getElementById('score-pct').style.color = col;
  setTimeout(() => { ring.style.strokeDashoffset = c * (1 - pct / 100); }, 100);
}

function restartQuiz() { questions = [...allQuestions]; resetQuiz(); document.getElementById('result-screen').style.display = 'none'; document.getElementById('quiz-screen').style.display = 'block'; document.getElementById('btn-next-nav').textContent = 'Weiter →'; renderQ(); }
function restartShuffle() { questions = shuffle([...allQuestions]); resetQuiz(); document.getElementById('result-screen').style.display = 'none'; document.getElementById('quiz-screen').style.display = 'block'; document.getElementById('btn-next-nav').textContent = 'Weiter →'; renderQ(); }

document.getElementById('btn-next-nav').onclick = handleNext;
showMenu(); renderQ();
</script>
